# utils/config.yml
#批量添加和修改、删除front matter配置文件

# 需要批量处理的路径，docs文件夹内的文件夹 (数组。映射路径：docs/arr[1]/arr[2] ... )
path:
  - docs # 第一个成员必须是docs
# 要删除的字段 (数组)
#注意如果frontmatter中该字段的值为true,则删除不会生效，先要修改为false 然后删除
delete:
  - feed
 # 要添加、修改front matter的数据 （front matter中没有的数据则添加，已有的数据则覆盖）
data:
